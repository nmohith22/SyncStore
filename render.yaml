services:
  - type: web
    name: syncstore-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    rootDir: backend
    envVars:
      - key: STEAM_API_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: syncstore-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s web/dist
    rootDir: .
    envVars:
      - key: NODE_VERSION
        value: 20
